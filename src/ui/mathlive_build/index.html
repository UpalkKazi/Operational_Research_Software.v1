<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://unpkg.com/mathlive@0.98.6/dist/mathlive.min.js"></script>
  <style>
    body {
      margin: 0; padding: 10px;
      font-family: system-ui, -apple-system, sans-serif;
      background: transparent;
      color: #e0e7f0;
    }
    .label {
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.05em; text-transform: uppercase;
      color: #8896b0; margin-bottom: 6px;
    }
    math-field {
      width: 100%;
      min-height: 50px;
      font-size: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      color: #e0e7f0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      transition: all 180ms ease;
    }
    math-field:focus-within {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2), 0 2px 12px rgba(0,0,0,0.2);
      background: rgba(255,255,255,0.07);
    }
    .or-toolbar {
      display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
      margin-bottom: 10px; padding: 8px 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .or-toolbar-section { display: flex; gap: 3px; align-items: center; }
    .or-toolbar-divider {
      width: 1px; align-self: stretch;
      background: rgba(255,255,255,0.08);
      margin: 0 6px;
    }
    .tb-btn {
      background: transparent;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 5px 9px;
      cursor: pointer;
      font-size: 14px;
      min-width: 30px;
      text-align: center;
      color: #c0cde0;
      transition: all 150ms ease;
      position: relative;
    }
    .tb-btn:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.12);
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .tb-btn:active {
      transform: translateY(0);
    }
    /* Template buttons — accent outline */
    .tb-btn[style*="font-size:11px"] {
      font-size: 11px !important;
      font-weight: 600;
      border: 1px solid rgba(59,130,246,0.35);
      background: rgba(59,130,246,0.08);
      color: #60a5fa;
      border-radius: 8px;
      padding: 4px 10px;
    }
    .tb-btn[style*="font-size:11px"]:hover {
      background: rgba(59,130,246,0.18);
      border-color: #3b82f6;
      color: #fff;
    }
    /* Tooltips */
    .tb-btn[data-tip] { position: relative; }
    .tb-btn[data-tip]::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 6px); left: 50%;
      transform: translateX(-50%) scale(0.96);
      padding: 4px 10px;
      background: #1e293b;
      color: #cbd5e1;
      font-size: 11px; font-weight: 500;
      white-space: nowrap;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      pointer-events: none;
      opacity: 0;
      transition: opacity 150ms ease 180ms, transform 150ms ease 180ms;
      z-index: 100;
    }
    .tb-btn[data-tip]:hover::after {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }
    .output-box {
      font-family: "SF Mono", "Fira Code", ui-monospace, monospace;
      font-size: 11px; color: #64748b;
      margin-top: 6px; word-break: break-all;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding-top: 6px;
    }
  </style>
</head>
<body>
  <div class="label" id="label"></div>
  <div id="toolbar-container"></div>
  <math-field id="mf"></math-field>
  <div class="output-box" id="out"></div>

  <script>
    // -- Minimal Streamlit Component Library (bi-directional) ----------------
    ;(function () {
      const Streamlit = {
        RENDER_EVENT: "streamlit:render",
        events: new EventTarget(),
        setComponentReady: function () {
          window.parent.postMessage(
            { isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 },
            "*"
          );
        },
        setComponentValue: function (value) {
          window.parent.postMessage(
            { isStreamlitMessage: true, type: "streamlit:setComponentValue", value: value },
            "*"
          );
        },
        setFrameHeight: function (height) {
          window.parent.postMessage(
            {
              isStreamlitMessage: true,
              type: "streamlit:setFrameHeight",
              height: height !== undefined ? height : document.body.scrollHeight + 10,
            },
            "*"
          );
        },
      };
      window.addEventListener("message", function (event) {
        if (event.data && event.data.type === "streamlit:render") {
          Streamlit.events.dispatchEvent(
            new CustomEvent(Streamlit.RENDER_EVENT, {
              detail: {
                args: event.data.args || {},
                disabled: event.data.disabled || false,
                theme: event.data.theme || {},
              },
            })
          );
        }
      });
      window.Streamlit = Streamlit;
    })();

    // -- Component logic -----------------------------------------------------
    const mf = document.getElementById("mf");
    const out = document.getElementById("out");
    const labelEl = document.getElementById("label");
    const toolbarContainer = document.getElementById("toolbar-container");

    let _lastInitLatex = null;
    let _toolbarBound = false;

    function bindToolbarButtons() {
      toolbarContainer.querySelectorAll("[data-cmd]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var cmd = JSON.parse(btn.dataset.cmd);
          mf.executeCommand(cmd);
          mf.focus();
        });
      });
      _toolbarBound = true;
    }

    Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, function (event) {
      var args = event.detail.args;

      labelEl.textContent = args.label || "";

      if (args.initial_latex !== undefined && args.initial_latex !== _lastInitLatex) {
        mf.setValue(args.initial_latex || "");
        out.textContent = "LaTeX: " + (args.initial_latex || "");
        _lastInitLatex = args.initial_latex;
      }

      if (args.toolbar_html && !_toolbarBound) {
        toolbarContainer.innerHTML = args.toolbar_html;
        bindToolbarButtons();
      }

      if (args.read_only) {
        mf.setAttribute("read-only", "");
      } else {
        mf.removeAttribute("read-only");
      }

      Streamlit.setFrameHeight(args.height || undefined);
    });

    // Debounced sync back to Python
    var _debounce;
    mf.addEventListener("input", function () {
      var latex = mf.getValue("latex");
      out.textContent = "LaTeX: " + latex;
      clearTimeout(_debounce);
      _debounce = setTimeout(function () {
        Streamlit.setComponentValue(latex);
      }, 350);
    });

    // Immediate sync on blur / commit
    mf.addEventListener("change", function () {
      clearTimeout(_debounce);
      Streamlit.setComponentValue(mf.getValue("latex"));
    });

    Streamlit.setComponentReady();
    Streamlit.setFrameHeight();
  </script>
</body>
</html>
