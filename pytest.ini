[pytest]
# Pytest configuration

# Minimum pytest version
minversion = 7.0

# Test paths
testpaths = tests

# Markers for categorizing tests
markers =
    integration: Integration tests requiring API access (deselect with '-m "not integration"')
    slow: Slow running tests (deselect with '-m "not slow"')
    unit: Fast unit tests
    solver: Tests requiring solver installation

# Coverage options
addopts = 
    --verbose
    --strict-markers
    --tb=short
    -ra

# Ignore patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage report
[coverage:run]
source = src
omit = 
    */tests/*
    */venv/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
